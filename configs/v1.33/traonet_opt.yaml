study_name: TPE
trials: 100
seed: 42
metric: val_loss
direction: minimize

sampler:
  name: optuna.samplers.TPESampler

search_space:
  net_config:
    num_layers:
      type: categorical
      choices: [2, 3, 4, 5]
    nhead:
      type: categorical
      choices: [4, 8, 16]
  optimizer_config:
    lr:
      type: float
      min: 1.e-3
      max: 1.e+0
      log: true
  scheduler_config:
    infimum_lr:
      type: float
      min: 1.e-7
      max: 1.e-3
      log: true
