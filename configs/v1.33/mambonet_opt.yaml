study_name: TPE
trials: 100
seed: 42
metric: val_loss
direction: minimize

sampler:
  name: optuna.samplers.TPESampler

search_space:
  net_config:
    num_layers1:
      type: categorical
      choices: [3, 4, 5]
    n_head:
      type: categorical
      choices: [8, 16, 32]
    num_layers2:
      type: categorical
      choices: [3, 4, 5]
  optimizer_config:
    lr:
      type: float
      min: 1.e-3
      max: 1.e+0
      log: true
  scheduler_config:
    infimum_lr:
      type: float
      min: 1.e-7
      max: 1.e-3
      log: true
